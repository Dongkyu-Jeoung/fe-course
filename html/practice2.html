<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 폼</title>
    <meta name="description" content="회원가입 폼 연습 페이지">
    <!-- Google font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">    <style>
        * {
            font-family: 'Noto Sans KR';
            font-size: 12px;
            font-weight: 500;
        }
        h1 {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
        }
        .tot_field {
            border: solid 2px rgb(224, 224, 224);
        }
        .sub_field1, .sub_field2 { 
            border: none; 
            margin-top: 10px; 
        }
        .sub_title {
            font-size: 18px;
            color: white;
            background-color: rgb(45, 102, 121);
            padding: 1px 10px;
        }
        /* 1번 subfield의 input창들 block level로 */
        .sub_field1 input {
            display: block;
            width: 100%;
            padding-bottom: 5px;
            margin-top: 3px;
        }
        /* div 별 padding : label top은 넓게, label bottom은 절반 */
        .sub_field1 article { padding: 5px 10px; }
        .sub_field2 article { padding: 10px 10px; }

        .question {
            margin-bottom: 8px;
        }
        /* multi_select div 아래 label들 뒤로 여백 출력 */
        .multi_select label::after {
            content: "";
            padding-right: 25px;
        }
        textarea {
            display: block;
            width: 100%;
            height: 200px;
        }
        /* gemini 도움 */
        /* 부모가 flex가 되면, 자식들은 flex item이 된다
            flex item들은 가로로 나열(default), 
            크기 설정 가능(span도 width 설정 가능),
            여백 무시(gap, margin으로 재설정) */
        .comp_btn {
            display: flex;
            gap: 20px;
            /* 컨텐츠들을 중앙 정렬 */
            justify-content: center;
            width: 100%;
        }
        .comp_btn button {
            color: white;
            padding: 5px 80px;
        }
        .comp_btn div:first-child button{
            background-color: rgb(60, 60, 60);
        }
        .comp_btn div:last-child button{
            background-color: rgb(45, 102, 121);
        }
    </style>
</head>
<body>
    <!-- 전체 회원가입 폼 -->
    <form action="#" method="GET">
        <!-- 전체 큰 틀 -->
        <fieldset class="tot_field">
            <h1>회원가입</h1>

            <!-- 첫번째 박스 : 필수항목 -->
            <fieldset class="sub_field1">
                <legend>
                    <span class="sub_title">필수항목</span>
                </legend>

                <!-- 아이디 -->
                <article>
                    <div>
                        <label for="id">아이디</label>
                    </div>
                    <div>
                        <input type="text" name="id" id="id">
                    </div>
                </article>
                <!-- 비밀번호 -->
                <article>
                    <div>
                        <label for="password">비밀번호</label>
                    </div>
                    <div>
                        <input type="password" name="password" id="password">
                    </div>
                </article>
                <!-- 이메일 -->
                <article>
                    <div>
                        <label for="email">이메일</label>
                    </div>
                    <div>
                        <input type="email" name="email" id="email"
                            placeholder="example@example.com">
                    </div>
                </article>
                <!-- 이름 -->
                <article>
                    <div>
                        <label for="name">성명</label>
                    </div>
                    <div>
                        <input type="text" name="name" id="name"
                            placeholder="홍길동">
                    </div>
                </article>
                <!-- 나이 -->
                <article>
                    <div>
                        <label for="age">나이</label>
                    </div>
                    <div>
                        <input type="number" name="age" id="age">
                    </div>
                </article>
            </fieldset>

            <!-- 두번째 박스: 당신에 대해서 알고 싶어요 -->
            <fieldset class="sub_field2">
                <legend>
                    <span class="sub_title">당신에 대해서 알고 싶어요!</span>
                </legend>
                <!-- 취미 -->
                <article>
                    <div class="question">
                        <span>취미를 선택해 주세요.</span>
                    </div>
                    <div class="multi_select">
                        <input type="radio" name="hobby" value="game" id="hobby_game">
                        <label for="hobby_game">게임하기</label>
                        <input type="radio" name="hobby" value="music" id="hobby_music">
                        <label for="hobby_music">음악듣기</label>
                        <input type="radio" name="hobby" value="ice-drink" id="hobby_drink">
                        <label for="hobby_drink">아이스음료 마시기</label>
                    </div>
                </article>
                <!-- 음료 -->
                <article>
                    <div class="question">
                        <span>좋아하는 음료를 선택해 주세요. (중복선택가능)</span>
                    </div>
                    <div class="multi_select">
                        <input type="checkbox" name="beverage" value="shake" id="bev_shake">
                        <label for="hobby_game">쉐이크 종류 음료</label>
                        <input type="checkbox" name="beverage" value="tea" id="bev_tea">
                        <label for="bev_tea">티 종류 음료</label>
                        <input type="checkbox" name="beverage" value="coffee" id="bev_coffee">
                        <label for="bev_coffee">커피 종류 음료</label>
                    </div>
                </article>
                <!-- 동아리 참석 가능 날짜 -->
                <article class="multi_select">
                    <label for="date">동아리 참석 가능 날짜 :</label>
                    <input type="date" name="date" id="date">
                </article>
                <!-- 참여 희망 모임 -->
                <article class="multi_select">
                    <label for="group">얼.죽.아에서 참여하고 싶은 모임은? :</label>
                    <select name="group" id="group">
                        <option value="defualt">--선택해주세요--</option>
                        <option value="americano">아메리카노</option>
                        <option value="latte">라떼</option>
                        <option value="vanilla">바닐라</option>
                    </select>
                </article>
                <!-- 포트폴리오 제출란 -->
                <article>
                    <div>
                        <label for="portfolio">포트폴리오 제출하기</label>
                    </div>
                    <div>
                        <input type="file" id="portfolio">
                    </div>
                </article>
                <!-- 마지막 말 -->
                <article>
                    <div>
                        <label for="message">마지막으로 하고 싶은 말은?</label>
                    </div>
                    <div>
                        <textarea name="message" id="message"></textarea>
                    </div>
                </article>
            </fieldset>

            <!-- 완료버튼 -->
            <article class="comp_btn">
                <div>
                    <button type="reset">다시하기</button>
                </div>
                <div>
                    <button type="submit">제출하기</button>
                </div>
            </article>
            
        </fieldset>
    </form>
</body>
</html>
