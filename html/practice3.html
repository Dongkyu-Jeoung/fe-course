<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 폼</title>
</head>
<body>
    <!-- 왕관모양 그림 -->
    <header>
        <div>
            <img src="#" alt="왕관">
        </div>
    </header>

    <!-- 그림부터 로그인 버튼까지 -->
    <main>
        <div>
            <img src="#" alt="사람 그림">
        </div>

        <!-- 아이디 입력 -->
        <div>
            <div>
                <label for="id"><img src="#" alt="편지 모양"></label>
            </div>
            <div>
                <input type="text" name="id" placeholder="Username">
            </div>
        </div>

        <!-- 패스워드 입력 -->
        <div>
            <div>
                <label for="password"><img src="#" alt="좌물쇠 모양"></label>
            </div>
            <div>
                <input type="password" name="password" placeholder="Password">
            </div>
        </div>

        <div>
            <!-- 계정 기억 체크 -->
            <div>
                <input type="radio" name="remember">
                <label for="remember"><span>Remember me</span></label>
            </div>

            <!-- 비번 까먹 -->
            <div>
                <a href="#">Forgot your password</a>
            </div>
            <div>
                <img src="#" alt="물음표 모양">
            </div>
        </div>

        <!-- 로그인 버튼 -->
        <div>
            <button type="submit">Login</button>
        </div>
    </main>

    <!-- 없음 -->
    <footer></footer>
</body>
</html>
