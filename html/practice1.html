<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 교육 상담폼</title>
</head>
<body>
    <h1>웹 개발 교육 상담 문의</h1>
    <p>
        HTML, CSS, JavaScript, React, 프론트엔드
        교육 과정에 대해 궁금한 내용을 남겨주세요.
        담당자가 확인 후 안내해 드립니다.
    </p>

    <fieldset>
        <legend>상담 신청 정보</legend>

        <label for="name">이름*</label>
        <input type="text" name="name" 
            placeholder="이름을 입력해주세요">
        <p>실명을 입력해 주세요.</p>

        <label for="email">이메일*</label>
        <input type="text" name="email"
            placeholder="example@email.com">
        <p>답변을 받을 이메일 주소를 입력해 주세요.</p>

        <label for="call">연락처</label>
        <input type="text" name="call" 
            placeholder="010-0000-0000"><br>

        <label for="interested">관심과정*</label>
        <select name="interested">
            <option value="선택">선택하세요</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
        </select><br>

        <label for="QA">문의내용*</label>
        <textarea name="QA" 
            placeholder="궁금한 내용을 자세히 입력해 주세요">
        </textarea><br>

        <p>예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>

        <input type="checkbox">
        <span>개인정보 수집 및 이용에 동의합니다.*</span><br>

        <button type="submit">상담 문의 보내기</button>
    </fieldset>
</body>
</html>
