<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Tag</title>
</head>
<body>
    <h1>Text Tag</h1>
    <!-- b 태그는 강조 / i 태그는 이태릭체 -->
    <p><b style="color: brown;">Lorem</b> ipsum dolor sit amet consectetur adipisicing elit. <br>
        Commodi eos illo, hic magni vitae sit perferendis possimus laborum <br>
         quaerat voluptatem placeat dolores assumenda quos ex esse. <br>
         <i>Ducimus</i> possimus ipsum minus!</p>
    
    <!-- 버튼에 id 값을 주어 object 구분 -->
    <div>
        <button id="btn1" onclick="handleSubmit()">클릭해주세요</button>
    </div>
</body>
</html>
