<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List tag</title>
</head>
<body>
    <h1>목록 표시 : ul / ol</h1>
    <!-- ul : unordered list / li : list -->
    <!-- ul>li*4 -->
    <ul>
        <li>unordered list</li>
        <li>unordered list</li>
        <li>unordered list</li>
        <li>unordered list</li>
    </ul>

    <!-- ol : ordered list -->
    <ol>
        <li>ordered list</li>
        <li>ordered list</li>
        <li>ordered list</li>
        <li>ordered list</li>
    </ol>
</body>
</html>
