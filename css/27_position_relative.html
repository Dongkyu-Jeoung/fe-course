<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position - relative</title>
    <style>
        h1, div { 
            border: 1px red solid; 
            /* html 적힌 순서대로 위치 : default */
            position: relative;
        }
        span {
            border: 2px solid blue;
            position: absolute;
            top :100px; 
            left: 200px;
        }
        .p {
            width: 600px;
            height: 300px;
            border: 2px solid green;
            position: relative;
        }
    </style>
</head>
<body>
    <h1>Position - relative</h1>
    <div>element 1</div>
    <div class="p">
        <span>element 2</span>
    </div>
</body>
</html>
