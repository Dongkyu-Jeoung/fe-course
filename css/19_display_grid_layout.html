<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid Layout</title>
    <style>
        div {border: 1px solid blue;}
        .grid_wrap {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 2fr 1fr;
            /* grid-template-columns: repeat(4, 1fr); */
            /* grid-template-rows: repeat(2, 50px); */
            grid-auto-rows: 40px;
        }
        .div1 {grid-row: span 2;}
        img[alt="img1"],img[alt="img2"] {
            width: 100px;
            height: 100px;
        }
        .list-grid-wrap{
            list-style-type: none;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            /* align-items: center; */
            justify-items: left;
            border: 1px solid red;
        }
        .item-grid {
            /* column 병합 table 세로선 기준 
            1번째 세로선 시작 ~ 3번째 세로선 끝 (1/3)
            span 2 : 첫번째 세로선부터 두칸 병합 */
            grid-column: span 2;
        }
        li {border: 1px solid blue;}
    </style>
</head>
<body>
    <h1>Display Grid Layout</h1>
    <div class="grid_wrap">
        <div class="div1">1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <ul class="list-grid-wrap">
        <li class="item-grid"><img src="../images/king.jpg" alt="img1"></li>
        <li><img src="../images/king.jpg" alt="img1"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
        <li><img src="../images/img01.jpg" alt="img2"></li>
    </ul>
</body>
</html>
