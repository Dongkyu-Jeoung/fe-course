<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id Selector</title>
    <meta name="description" content="Id Selector">
    <style>
        #h1_1 {
            /* 글자색: 토마토, 가로: 300px, 높이: 400px, 배경색: green */
            color:tomato;
            width: 300px; height: 400px;
            background-color: green;
        }
        #h1_2 {
            /* 글자색: 토마토, 배경색: yellow */
            color:tomato;
            background-color: yellow;
        }
        #h1_3 {
            /* 글자색: blue, 배경색: yellow */
            color:blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="h1_1">ID Selector #1</h1>
    <h1 id="h1_2">ID Selector #2</h1>
    <h1 id="h1_3">ID Selector #3</h1>
</body>
</html>
