<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 폰트어썸 CDN -->
    <link rel="stylesheet"
       href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: "Nanum Gothic";}
        body { margin: 0px;}
        header { background-color: rgb(246,245,239);}
        .header_top {
            max-width: 800px;
            width: 100%;
            margin: auto;
        }
        ul {
            display: flex;
            gap: 20px;
            list-style: none;
        }
        #logo_img {
            width:80px;
            height: 80px;
        }
        .menu_top {
            justify-content: right;
            padding-right: 30px;
        }
        .menu_top a:hover {
            text-decoration: underline;
        }
        .menu_bottom a:hover {
            color: green;
            text-decoration: underline;
        }
        .menu_top a{
            color: rgb(79, 79, 79);
            font-size: 10px;
            text-decoration: none;
        }
        .menu_bottom a{
            color: rgb(79, 79, 79);
            font-size: 13px;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        input {display: none;}
        .header_top{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 10px; 
        }
        .search_btn {
            border: .5px solid lightgray;
            border-radius: 4px;
            background-color: white;
            padding: 3px;
            cursor: pointer;
        }
        .search_btn:hover input{
            display : inline;
        }
        .banner_wrap {
            width: 100%;
            height: 32.3vw;
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            padding: 0;
            position: relative;

            border: 2px solid green;
        }
        .drink_wrap {
            display : flex;
            gap: 0;
            position: relative;
            top: -7%;
            left: 80%;
            transform: translateX(-50%);
            /* border: 3px solid gold; */
        }
        img[alt="cali"] {
            width: 20vw;
            height: 5vw;
        }
        .cali_wrap {
            width: 20vw;
            height: 5vw;

            position: relative;
            top :50%;
            transform: translateY(-50%);
            left: 5vw ;
        }
        .drink_img {
            width: 12.5vw;
            height: 20vw;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }
        .detail_btn {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            left: 10vw;
        }
        .link_dtl {
            border: 1px solid #ac85ba;
            font-size: 1.2vw;
            color: #ac85ba;
            text-decoration: none;
            border-radius: 4px;

            display: block;
            width: 12vw;
            height: 3vw;
            text-align: center;
            align-content: center;
        }
        #drink_img1 {animation-delay: .5s;}
        #drink_img2 {
            animation-delay: 1s;
            position: relative;
            left : -2vw;
        }
        #drink_img3 {
            animation-delay: 1.5s;
            position: relative;
            left : -6vw;
        }
        #drink_img4 {animation-delay: 2s;}
        #drink_img5 {animation-delay: 2.5s;}
        @keyframes fadeInUp {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header_top">
            <a href="#">
                <img src="https://www.starbucks.co.kr/common/img/common/logo.png" 
                    alt="LOGO" id="logo_img">
            </a>
            <div class="header_menu">
                <!-- menu top -->
                <ul class="menu_top">
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Sevice & Ideas</a></li>
                    <li><a href="#">Find Store</a></li>
                    <li>
                        <label for="search">
                            <button class="search_btn">
                                <input type="text" name="search" id="search" placeholder="통합검색">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </label>
                    </li>
                </ul>
                <!-- menu bottom -->
                <ul class="menu_bottom">
                    <li><a href="#">COFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </div>
        </div>
    </header>
    <main>
        <!-- 전체 배너 -->
        <div class="banner_wrap">
            <!-- 캘리 -->
            <div class="cali_wrap">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" 
                    alt="cali">
            </div>
            <!-- '자세히보기' 버튼 -->
            <div class="detail_btn">
                <a href="#" class="link_dtl">자세히 보기</a>
            </div>
            <div class="drink_wrap">
                <!-- 메뉴1 -->
                <div>
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" 
                        alt="dirnk1" class="drink_img" id="drink_img1">
                </div>
                <!-- 메뉴2 -->
                <div>
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" 
                        alt="drink2" class="drink_img" id="drink_img2">
                </div>
                <!-- 메뉴3 -->
                <div>
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" 
                        alt="drink3" class="drink_img" id="drink_img3">
                </div>
                <!-- 메뉴4 -->
                <div>
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" 
                        alt="drink4" class="drink_img" id="drink_img4">
                </div>
                <!-- 메뉴5 -->
                <div>
                    <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" 
                        alt="drink5" class="drink_img" id="drink_img5">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
