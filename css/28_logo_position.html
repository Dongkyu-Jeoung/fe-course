<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Position</title>
    <style>
        img[alt="logo_img"] {
            width: 100px;
            height: 100px;
        }
        .parent {
            width: 100%;
            height: 100px;
            position: relative;
        }
        .child {
            margin: 0;
            padding-left: 10px;
            position: absolute;
            left: 100px;
            top: 0;
        }
    </style>
</head>
<body>
    <h1>Logo Position</h1>
    <hr>
    <div class="parent">
        <img src="https://www.starbucks.co.kr/common/img/common/logo.png" 
            alt="logo_img">
        <p class="child">STARBUCKS COFFEE</p>
    </div>
</body>
</html>
