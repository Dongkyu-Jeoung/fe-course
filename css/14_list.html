<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Style</title>
    <meta name="description" content="List Style">
    <style>
        /* block line : 바깥 여백이 margin, 안쪽 여백이 padding */
        ul {
            background-color: aquamarine;
            list-style-type: none;
            padding-left: 0px;
        }
        ol {
            background-color: tomato;
            list-style-type: '⭕ ';
        }
        li {
            background-color: yellow;
        }
        h3 { border: 1px solid blue }
    </style>
</head>
<body>
    <h1>List Style</h1>
    <ul>
        <h3>Front End</h3>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol>
        <h3>Back End</h3>
        <li>JSP</li>
        <li>ASP</li>
        <li>Node JS</li>
    </ol>
</body>
</html>
