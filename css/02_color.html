<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Colors</title>
    <meta name="description" content="CSS-Colors">
    <style>
        h2{ color:blue; }
        h3{ color: rgb(225, 212, 232); }
        /* rgba 마지막 a 값은 투명도 0~1 */
        h4{ color: rgba(105, 229, 211, 0.5) }
        h5{ color: #ebe845; }
    </style>
</head>
<body>
    <h1>CSS-Colors</h1>
    
    <h2>Color-name</h2>
    <h3>Color-rgb</h3>
    <h4>Color-rgba</h4>
    <h5>Color-hexa</h5>
</body>
</html>
