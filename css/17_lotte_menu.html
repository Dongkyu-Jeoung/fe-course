<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotte Cinema</title>
    <meta name="description" content="Lotte Cinema header 부분">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        header {
            width: 900px;
            /* 900px 짜리 */
            margin: auto;
        }
        .header_top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 0px;
            border-bottom: 1px solid lightgrey;
        }
        .nav ul{
            display: flex;
            padding-left: 0px;
            list-style-type: none;
            gap: 13px;
        }
        .nav {
            font-size: 9px;
        }
        .nav a{
            color: rgb(84, 84, 84);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header_top">
            <!-- SNS 링크 -->
            <nav class="nav">
                <ul>
                    <li><a href=""><i class="fa-brands fa-instagram"></i> 인스타그램</a></li>
                    <li><a href=""><i class="fa-brands fa-youtube"></i> 유튜브</a></li>
                    <li><a href=""><i class="fa-brands fa-facebook"></i> 페이스북</a></li>
                </ul>
            </nav>
            <!-- 로고 -->
            <div>
                <a href="#">
                    <img src="https://www.lottecinema.co.kr/NLCHS/Content/images/common/logo.png" 
                        alt="LOGO">
                </a>
            </div>
            <!-- 메뉴 -->
            <nav class="nav">
                <ul>
                    <li><a href="#">멤버십</a></li>
                    <li><a href="#">고객센터</a></li>
                    <li><a href="#">단체관람/대관문의</a></li>
                    <li><a href="#">로그인</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
