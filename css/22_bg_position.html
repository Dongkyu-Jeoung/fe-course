<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Position</title>
    <style>
        .bg_wrap {
            /* border: 1px solid tomato; */
            width: 100%;
            height: 300px;
            background-image: url("../images/pattern1.jpg");
            background-repeat: no-repeat;
            /* 50% 50% -> left : 50%, top : 50% */
            background-position: 50% 50%;
            /* cover : background 전체에 이미지 채움 */
            /* contain : 이미지 배율에 맞춰 채움 */
            background-size: auto;
        }
        .bg_wrap_star {
            width: 100%;
            /* viewport : vm = (이미지 높이(px) / vw너비(가로해상도)) * 100 */
            height: 32.3vw;
            background-image: url("https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg");
            background-repeat: no-repeat;
            /* 50% 50% -> center와 동일 */
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body>
    <h1>Background Position</h1>
    <div class="bg_wrap"></div>
    <div class="bg_wrap_star"></div>
</body>
</html>
